name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Docker Hub login ─────────────────────────────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # ── Set up Docker Buildx (enables layer caching) ─────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Build & push API image ───────────────────────────────────────────────
      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/gip-insight-api:latest
          cache-from: type=gha,scope=api
          cache-to:   type=gha,scope=api,mode=max

      # ── Build & push Web image ───────────────────────────────────────────────
      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/gip-insight-web:latest
          cache-from: type=gha,scope=web
          cache-to:   type=gha,scope=web,mode=max

      # ── Write .env + docker-compose.yml to the droplet ─────────────────────
      # The production .env content is stored as the PROD_ENV GitHub secret.
      # Writing it here means rotating a secret or adding a variable only
      # requires updating the GitHub secret — no manual SSH needed.
      - name: Inject .env and docker-compose.yml
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DROPLET_HOST }}
          username: root
          key:      ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            mkdir -p /opt/gip-insight
            # Write env file atomically (temp → rename) to avoid partial reads
            printf '%s' '${{ secrets.PROD_ENV }}' > /opt/gip-insight/.env.tmp
            mv /opt/gip-insight/.env.tmp /opt/gip-insight/.env
            chmod 600 /opt/gip-insight/.env

      - name: Copy docker-compose.yml to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.DROPLET_HOST }}
          username: root
          key:      ${{ secrets.DROPLET_SSH_KEY }}
          source:   docker-compose.yml
          target:   /opt/gip-insight

      # ── Pull new images and restart containers ───────────────────────────────
      - name: Deploy to DigitalOcean droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DROPLET_HOST }}
          username: root
          key:      ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -e
            cd /opt/gip-insight
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
