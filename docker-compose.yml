services:
  gip-api:
    image: rishabhpersonal/gip-insight-api:latest
    container_name: gip-insight-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      # SSH private key used to tunnel into the jump host (jh.ginesys.one).
      # Place the key at /opt/gip-insight/tunnel_key on the droplet (chmod 600).
      - /opt/gip-insight/tunnel_key:/run/secrets/tunnel_key:ro
    env_file:
      # /opt/gip-insight/.env on the droplet — never committed to git.
      # Injected by the GitHub Actions deploy workflow from repository secrets.
      - .env
    environment:
      # Azure Blob Storage — sourced from .env (injected by CI).
      # Required for reading task input/output payloads in the job detail view.
      AZURE_STORAGE_CONNECTION_STRING: ${AZURE_STORAGE_CONNECTION_STRING}
      AZURE_STORAGE_CONTAINER: ${AZURE_STORAGE_CONTAINER}
    networks:
      - gip-network

  gip-web:
    image: rishabhpersonal/gip-insight-web:latest
    container_name: gip-insight-web
    restart: unless-stopped
    ports:
      - "4000:3000"
    env_file:
      # Same .env as the API — the web container reads only the auth vars from it.
      - .env
    environment:
      NODE_ENV: production
      # Dashboard login credentials — sourced from .env (injected by CI).
      DASHBOARD_USERNAME: ${DASHBOARD_USERNAME}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD}
      AUTH_SECRET: ${AUTH_SECRET}
    depends_on:
      - gip-api
    networks:
      - gip-network

networks:
  gip-network:
    name: gip-insight-network
